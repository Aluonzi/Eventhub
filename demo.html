<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#6c35de">
<meta name="description" content="EventHub — Premium Hostel Event Management Platform">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EventHub">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="EventHub">
<meta name="msapplication-TileColor" content="#6c35de">
<meta name="msapplication-tap-highlight" content="no">
<!-- PWA Icons injected via JS below -->
<link rel="apple-touch-icon" id="apple-icon">
<link rel="icon" type="image/svg+xml" id="favicon-svg">
<link rel="manifest" id="pwa-manifest">
<title>EventHub — Hostel Events</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
:root{
  --v:#6c35de;--v2:#9b6dff;--vbg:#f3eeff;--vbrd:rgba(108,53,222,.2);
  --c:#0099cc;--cbg:#e6f7ff;
  --rose:#e8194b;--rbg:#fff0f4;
  --lime:#00a854;--lbg:#f0fff7;
  --amb:#e6a817;--abg:#fff8e6;
  --surf:#fff;--card2:#f7f8fc;
  --bord:#e2e6f0;--bord2:#c8cfe8;
  --txt:#0f1623;--txt2:#3a4460;--mut:#8892aa;
  --sh:0 2px 12px rgba(15,22,50,.08);
  --sh2:0 8px 32px rgba(15,22,50,.13);
  --sw:235px;
}
[data-bs-theme="dark"]{
  --vbg:rgba(123,47,255,.1);--vbrd:rgba(123,47,255,.25);
  --cbg:rgba(0,212,255,.07);--rbg:rgba(255,45,107,.08);
  --lbg:rgba(0,255,136,.07);--abg:rgba(255,184,0,.07);
  --surf:#090d1a;--card2:#111828;--bord:#1a2340;--bord2:#243060;
  --txt:#e8eeff;--txt2:#c0c8e8;--mut:#4a567a;
  --sh:0 2px 12px rgba(0,0,0,.4);--sh2:0 8px 32px rgba(0,0,0,.6);
}
*,*::before,*::after{box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bs-body-bg);
  color:var(--bs-body-color);min-height:100vh;margin:0;transition:background .3s,color .3s}
.screen{display:none;min-height:100vh}.screen.on{display:flex}

/* SPLASH */
#splash{flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(145deg,#1a0533,#0d1a3a,#05111f);
  position:relative;overflow:hidden}
#splash::before{content:'';position:absolute;top:-200px;left:-200px;width:700px;height:700px;
  background:radial-gradient(circle,rgba(108,53,222,.25),transparent 65%);
  border-radius:50%;pointer-events:none;animation:pulseBg 4s ease-in-out infinite}
#splash::after{content:'';position:absolute;bottom:-150px;right:-150px;width:500px;height:500px;
  background:radial-gradient(circle,rgba(0,153,204,.18),transparent 65%);
  border-radius:50%;pointer-events:none}
@keyframes pulseBg{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.sp-content{position:relative;z-index:1;text-align:center;padding:24px}
.sp-logo-wrap{margin-bottom:28px}
.sp-title{font-size:clamp(34px,9vw,52px);font-weight:900;color:#fff;
  text-shadow:0 0 40px rgba(155,109,255,.6);letter-spacing:-1px}
.sp-title span{background:linear-gradient(135deg,#9b6dff,#00bfff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sp-tagline{font-size:13px;color:rgba(255,255,255,.55);letter-spacing:2px;
  text-transform:uppercase;margin-bottom:32px}
.sp-halls{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:48px}
.sp-hall{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  border-radius:20px;padding:5px 14px;font-size:11px;font-weight:600;
  color:rgba(255,255,255,.7)}
.btn-splash{background:linear-gradient(135deg,#6c35de,#0099cc);border:none;
  border-radius:50px;color:#fff;font-size:16px;font-weight:700;padding:18px 72px;
  cursor:pointer;box-shadow:0 8px 32px rgba(108,53,222,.5);
  transition:transform .3s,box-shadow .3s;letter-spacing:.5px}
.btn-splash:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(108,53,222,.65)}
.sp-version{font-size:11px;color:rgba(255,255,255,.25);margin-top:28px}

/* AUTH */
#auth{flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(145deg,#f3eeff,#e8f4ff,#f0f2f8);
  padding:24px 20px;position:relative;overflow:hidden}
[data-bs-theme="dark"] #auth{background:linear-gradient(145deg,#05070f,#0d1224)}
#auth::before{content:'';position:absolute;top:-180px;left:-180px;width:600px;height:600px;
  background:radial-gradient(circle,rgba(108,53,222,.1),transparent 65%);
  border-radius:50%;pointer-events:none}
.auth-wrap{position:relative;z-index:1;width:100%;max-width:420px}
.auth-logo-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:20px}
.auth-brand-text{font-size:22px;font-weight:900;
  background:linear-gradient(135deg,#6c35de,#0099cc);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-top:6px}
.auth-tag{font-size:11px;color:var(--mut);letter-spacing:.8px}
.auth-card{background:var(--surf);border:1px solid var(--bord);border-radius:20px;
  padding:30px 28px;box-shadow:0 16px 48px rgba(108,53,222,.1),0 2px 8px rgba(0,0,0,.06)}
.auth-lbl{font-size:12px;font-weight:700;color:var(--txt2);display:block;margin-bottom:5px}
.auth-inp{background:var(--card2);border:1px solid var(--bord);border-radius:8px;
  padding:11px 13px;color:var(--txt);font-size:13px;width:100%;outline:none;
  transition:border-color .2s,box-shadow .2s;margin-bottom:12px}
.auth-inp:focus{border-color:#6c35de;box-shadow:0 0 0 3px rgba(108,53,222,.1)}
.auth-inp::placeholder{color:var(--mut)}
.btn-ap{width:100%;background:linear-gradient(135deg,#6c35de,#0099cc);border:none;
  border-radius:8px;color:#fff;font-size:13px;font-weight:700;padding:12px;cursor:pointer;
  box-shadow:0 4px 14px rgba(108,53,222,.3);transition:opacity .2s,transform .2s;margin-bottom:10px}
.btn-ap:hover{opacity:.9;transform:translateY(-1px)}
.btn-ao{width:100%;background:var(--surf);border:1.5px solid var(--bord2);border-radius:8px;
  color:var(--txt2);font-size:13px;font-weight:600;padding:11px;cursor:pointer;
  transition:border-color .2s,color .2s}
.btn-ao:hover{border-color:#6c35de;color:#6c35de}
.alnk{font-size:11px;color:var(--mut);cursor:pointer;font-weight:600;
  background:none;border:none;padding:0}
.alnk:hover{color:#6c35de}
.alnkv{font-size:11px;color:var(--v);cursor:pointer;font-weight:600;background:none;border:none;padding:0}
.alnkv:hover{text-decoration:underline}
.auth-err{background:var(--rbg);border:1px solid rgba(232,25,75,.2);border-radius:8px;
  padding:9px 13px;font-size:12px;color:var(--rose);margin-bottom:12px;display:none}
.auth-err.on{display:block}
.auth-ok{background:var(--lbg);border:1px solid rgba(0,168,84,.2);border-radius:8px;
  padding:9px 13px;font-size:12px;color:var(--lime);margin-bottom:12px;display:none}
.auth-ok.on{display:block}
.admin-links{display:flex;justify-content:center;gap:20px;margin-top:16px;
  position:relative;z-index:1}

/* APP */
#app-screen{flex-direction:row}
#sidebar{width:var(--sw);background:var(--surf);border-right:1px solid var(--bord);
  display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;
  z-index:50;box-shadow:var(--sh);transition:transform .3s;overflow:hidden}
#sidebar.collapsed{transform:translateX(-100%)}
.sb-logo{padding:16px 18px 12px;flex-shrink:0;cursor:pointer}
.sb-logo-row{display:flex;align-items:center;gap:10px}
.sb-brand{font-size:16px;font-weight:900;
  background:linear-gradient(90deg,var(--v2),var(--c));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sb-sub{font-size:9px;color:var(--mut);margin-top:2px}
.sdiv{height:1px;background:var(--bord);margin:0 14px;flex-shrink:0}
#nav{flex:1;overflow-y:auto;padding:6px 8px;scrollbar-width:none}
#nav::-webkit-scrollbar{display:none}
.ni{display:flex;align-items:center;gap:10px;padding:10px 11px;cursor:pointer;
  font-size:13px;color:var(--mut);border-radius:8px;margin:1px 0;
  border:1px solid transparent;position:relative;text-decoration:none;
  transition:background .15s,color .15s,border-color .15s;white-space:nowrap;overflow:hidden}
.ni:hover{color:var(--txt);background:var(--vbg)}
.ni.on{color:var(--v);background:var(--vbg);border-color:var(--bord2);font-weight:600}
.ni.on::before{content:'';position:absolute;left:0;top:20%;height:60%;width:3px;
  background:linear-gradient(180deg,var(--v),var(--c));border-radius:2px}
.ni-ic{width:18px;text-align:center;font-size:14px;flex-shrink:0}
.ni-badge{margin-left:auto;background:var(--rose);color:#fff;border-radius:20px;
  font-size:10px;font-weight:700;padding:2px 7px;flex-shrink:0}
.sb-user{padding:12px 15px;border-top:1px solid var(--bord);display:flex;
  align-items:center;gap:10px;background:var(--card2);flex-shrink:0;min-width:0}
.su-nm{font-size:12px;font-weight:700;color:var(--txt);white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.su-role{font-size:10px;color:var(--v);margin-top:2px;text-transform:capitalize}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--lime);
  flex-shrink:0;margin-left:auto}
.av{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
  font-weight:800;color:#fff;flex-shrink:0;overflow:hidden;vertical-align:middle;line-height:1}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.av-grad{background:linear-gradient(135deg,var(--v),var(--c))}
#main{margin-left:var(--sw);flex:1;min-height:100vh;background:var(--bs-body-bg);
  display:flex;flex-direction:column}
#topbar{height:62px;background:var(--surf);border-bottom:1px solid var(--bord);
  display:flex;align-items:center;justify-content:space-between;padding:0 24px;
  position:sticky;top:0;z-index:40;box-shadow:var(--sh);flex-shrink:0;gap:12px}
.tb-left{display:flex;align-items:center;gap:10px;min-width:0}
.tb-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tb-title{font-size:15px;font-weight:700;color:var(--txt);white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.tbbtn{width:36px;height:36px;border-radius:8px;background:var(--card2);
  border:1px solid var(--bord);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:15px;color:var(--txt);position:relative;
  transition:background .15s,border-color .15s;flex-shrink:0}
.tbbtn:hover{background:var(--vbg);border-color:var(--bord2)}
.ndot{position:absolute;top:5px;right:5px;width:7px;height:7px;background:var(--rose);
  border-radius:50%;border:2px solid var(--surf);display:none}
.ndot.on{display:block}
.sbox{background:var(--card2);border:1px solid var(--bord);border-radius:8px;
  padding:8px 13px 8px 32px;color:var(--txt);font-size:12px;width:200px;outline:none;
  transition:border-color .2s}
.sbox:focus{border-color:var(--v)}
.sbox::placeholder{color:var(--mut)}
.menu-btn{display:none;width:36px;height:36px;border-radius:8px;background:var(--card2);
  border:1px solid var(--bord);align-items:center;justify-content:center;cursor:pointer;
  font-size:18px;color:var(--txt);flex-shrink:0}
.notif-wrap{position:relative}
.notif-panel{position:absolute;top:46px;right:0;width:320px;background:var(--surf);
  border:1px solid var(--bord);border-radius:16px;box-shadow:var(--sh2);z-index:100;
  display:none;overflow:hidden;max-height:420px;overflow-y:auto}
.notif-panel.on{display:block}
.notif-hdr{padding:12px 16px;border-bottom:1px solid var(--bord);display:flex;
  justify-content:space-between;align-items:center}
.notif-item{padding:12px 16px;border-bottom:1px solid var(--bord);cursor:pointer;
  transition:background .15s}
.notif-item:last-child{border-bottom:none}
.notif-item:hover{background:var(--vbg)}
.notif-item.unread{border-left:3px solid var(--v)}
#page{flex:1;padding:24px;overflow-y:auto}

/* COMPONENTS */
.ehc{background:var(--surf);border:1px solid var(--bord);border-radius:16px;
  box-shadow:var(--sh);overflow:hidden;transition:border-color .15s}
.ehc:hover{border-color:var(--bord2)}
.stat-card{background:var(--surf);border:1px solid var(--bord);border-radius:16px;
  padding:18px;box-shadow:var(--sh);position:relative;overflow:hidden}
.stat-val{font-size:24px;font-weight:800;line-height:1}
.stat-lbl{font-size:11px;color:var(--mut);margin-top:4px}
.sc-acc{position:absolute;top:-14px;right:-14px;width:70px;height:70px;
  border-radius:50%;opacity:.12;filter:blur(12px)}
.bv{background:linear-gradient(135deg,var(--v),var(--c));color:#fff;border:none;
  border-radius:8px;font-weight:700;font-size:13px;padding:10px 18px;cursor:pointer;
  box-shadow:0 3px 12px rgba(108,53,222,.25);transition:all .2s;
  display:inline-flex;align-items:center;gap:6px}
.bv:hover{box-shadow:0 5px 20px rgba(108,53,222,.4);transform:translateY(-1px);color:#fff}
.bv:active{transform:scale(.97)}
.bg{background:transparent;color:var(--mut);border:1px solid var(--bord);
  border-radius:8px;font-weight:600;font-size:13px;padding:10px 18px;cursor:pointer;
  transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.bg:hover{border-color:var(--bord2);color:var(--txt);background:var(--card2)}
.bl{background:linear-gradient(135deg,#00a854,#00d46a);color:#fff;border:none;
  border-radius:8px;font-weight:700;font-size:13px;padding:10px 18px;cursor:pointer;
  transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.br{background:linear-gradient(135deg,#c0143a,var(--rose));color:#fff;border:none;
  border-radius:8px;font-weight:700;font-size:13px;padding:10px 18px;cursor:pointer;
  transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.bsm{padding:7px 13px;font-size:12px}.bxs{padding:4px 10px;font-size:11px}
.bdv{background:var(--vbg);color:var(--v);border:1px solid var(--vbrd);border-radius:20px;font-size:11px;font-weight:700;padding:3px 10px;display:inline-block}
.bdc{background:var(--cbg);color:var(--c);border:1px solid rgba(0,153,204,.2);border-radius:20px;font-size:11px;font-weight:700;padding:3px 10px;display:inline-block}
.bdl{background:var(--lbg);color:var(--lime);border:1px solid rgba(0,168,84,.2);border-radius:20px;font-size:11px;font-weight:700;padding:3px 10px;display:inline-block}
.bdr{background:var(--rbg);color:var(--rose);border:1px solid rgba(232,25,75,.2);border-radius:20px;font-size:11px;font-weight:700;padding:3px 10px;display:inline-block}
.bda{background:var(--abg);color:var(--amb);border:1px solid rgba(230,168,23,.2);border-radius:20px;font-size:11px;font-weight:700;padding:3px 10px;display:inline-block}
.bdlive{background:var(--rbg);color:var(--rose);border:1px solid rgba(232,25,75,.3);border-radius:20px;font-size:11px;font-weight:700;padding:3px 10px;display:inline-block;animation:livep 1.6s infinite}
@keyframes livep{0%,100%{opacity:1}50%{opacity:.6}}
.priv-badge{display:inline-flex;align-items:center;gap:4px;background:#f1f5f9;
  border:1px solid #e2e8f0;border-radius:20px;font-size:10px;font-weight:600;
  padding:2px 8px;color:#64748b}
[data-bs-theme="dark"] .priv-badge{background:var(--card2);border-color:var(--bord);color:var(--mut)}
.inp{background:var(--card2);border:1px solid var(--bord);border-radius:8px;
  padding:10px 13px;color:var(--txt);font-size:13px;width:100%;outline:none;
  transition:border-color .2s,box-shadow .2s}
.inp:focus{border-color:var(--v);box-shadow:0 0 0 3px rgba(108,53,222,.08)}
.inp::placeholder{color:var(--mut)}
textarea.inp{resize:vertical;min-height:80px}
select.inp{appearance:none;cursor:pointer}
.tog{width:44px;height:24px;border-radius:12px;background:var(--bord2);position:relative;
  cursor:pointer;transition:all .25s;flex-shrink:0;border:none;padding:0}
.tog.on{background:linear-gradient(90deg,var(--v),var(--c));box-shadow:0 2px 8px rgba(108,53,222,.3)}
.togk{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;
  background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);pointer-events:none}
.tog.on .togk{left:23px}
.evc{background:var(--surf);border:1px solid var(--bord);border-radius:16px;overflow:hidden;
  transition:all .2s;display:flex;flex-direction:column;box-shadow:var(--sh)}
.evc:hover{transform:translateY(-3px);box-shadow:var(--sh2);border-color:var(--bord2)}
.evimg{height:155px;position:relative;overflow:hidden;background:#e2e6f0;flex-shrink:0}
.evimg img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.evc:hover .evimg img{transform:scale(1.04)}
.evimg-ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.05),rgba(0,0,0,.6))}
.evimg-title{position:absolute;bottom:10px;left:12px;right:12px;color:#fff;font-size:14px;font-weight:700;line-height:1.3}
.evbo{padding:13px;flex:1;display:flex;flex-direction:column;gap:7px}
.pbr{height:5px;background:var(--bord);border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;transition:width .5s}
.msg-wrap{display:flex;overflow:hidden;height:500px}
.msg-list{width:240px;flex-shrink:0;border-right:1px solid var(--bord);overflow-y:auto}
.msg-item{padding:12px 14px;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
.msg-item:hover{background:var(--vbg)}.msg-item.on{background:var(--vbg);border-left-color:var(--v)}
.bbl{max-width:72%;border-radius:13px;padding:9px 13px;font-size:13px;line-height:1.5}
.bbl-in{background:var(--card2);border:1px solid var(--bord);border-bottom-left-radius:3px}
.bbl-out{background:linear-gradient(135deg,var(--v),var(--c));color:#fff;border-bottom-right-radius:3px}
.bbl-time{font-size:10px;opacity:.55;margin-top:3px}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.msg-row{display:flex;gap:8px}.msg-row.out{flex-direction:row-reverse}
.msg-row.out .bbl-time{text-align:right}
.chat-inp-area{padding:10px 12px;border-top:1px solid var(--bord);display:flex;gap:8px;
  align-items:center;background:var(--card2);flex-shrink:0}
.msg-thread{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.prof-banner{height:130px;position:relative;overflow:hidden;
  background:linear-gradient(135deg,var(--vbg),var(--cbg))}
.prof-banner img{width:100%;height:100%;object-fit:cover}
.prof-av-wrap{position:relative;margin-top:-32px;margin-left:20px;display:inline-block}
.cover-wrap{position:relative;height:140px;border-radius:12px;overflow:hidden;
  background:linear-gradient(135deg,var(--vbg),var(--cbg));margin-bottom:16px;cursor:pointer}
.cover-wrap img{width:100%;height:100%;object-fit:cover}
.cover-edit-btn{position:absolute;bottom:10px;right:10px;background:rgba(255,255,255,.9);
  border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;
  color:#0f1623;cursor:pointer}
.poll-o{position:relative;border-radius:8px;overflow:hidden;border:1px solid var(--bord);
  margin-bottom:8px;transition:all .2s}
.poll-o.voted-this{border-color:var(--v);box-shadow:0 0 0 2px rgba(108,53,222,.1)}
.poll-bg{position:absolute;top:0;left:0;height:100%;background:var(--vbg);transition:width .5s}
.poll-rw{position:relative;display:flex;justify-content:space-between;align-items:center;padding:11px 14px}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;border-radius:6px;font-size:12px;cursor:pointer;
  transition:all .15s;position:relative;border:1px solid transparent}
.cal-day:hover{background:var(--vbg)}
.cal-day.today{background:var(--v);color:#fff}
.cal-day.has-ev{border-color:var(--amb);background:var(--abg)}
.cal-day.today.has-ev{background:var(--v);color:#fff}
.cal-ev-dot{position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--amb)}
.cal-day.today .cal-ev-dot{background:rgba(255,255,255,.8)}
.star-btn{background:none;border:none;font-size:26px;cursor:pointer;padding:2px;

// ══════════════════════════════════════════
// LOGO — SVG generated inline, no external deps
// ══════════════════════════════════════════
var LOGO = {
  // Returns SVG string at given size
  svg: function(sz, forDark) {
    sz = sz || 48;
    return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="'+sz+'" height="'+sz+'" style="display:block">'
      // Outer circle
      + '<circle cx="50" cy="50" r="48" fill="url(#lg1)"/>'
      // Building silhouette (hostel)
      + '<rect x="22" y="38" width="56" height="36" rx="3" fill="rgba(255,255,255,.15)"/>'
      + '<rect x="30" y="30" width="40" height="46" rx="3" fill="rgba(255,255,255,.25)"/>'
      // Windows
      + '<rect x="36" y="40" width="8" height="8" rx="2" fill="rgba(255,255,255,.9)"/>'
      + '<rect x="56" y="40" width="8" height="8" rx="2" fill="rgba(255,255,255,.9)"/>'
      + '<rect x="36" y="55" width="8" height="8" rx="2" fill="rgba(255,255,255,.7)"/>'
      + '<rect x="56" y="55" width="8" height="8" rx="2" fill="rgba(255,255,255,.7)"/>'
      // Door
      + '<rect x="44" y="62" width="12" height="14" rx="2" fill="rgba(255,255,255,.95)"/>'
      // Star / event sparkle top
      + '<path d="M50 14 L52 20 L58 20 L53 24 L55 30 L50 26 L45 30 L47 24 L42 20 L48 20 Z" fill="rgba(255,220,80,.95)"/>'
      // Gradient defs
      + '<defs><linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">'
      + '<stop offset="0%" stop-color="#6c35de"/>'
      + '<stop offset="100%" stop-color="#0099cc"/>'
      + '</linearGradient></defs>'
      + '</svg>';
  },
  // Returns a canvas data-url for PWA icons
  dataUrl: function(sz) {
    var canvas = document.createElement('canvas');
    canvas.width = sz; canvas.height = sz;
    var ctx = canvas.getContext('2d');
    // Background gradient
    var grad = ctx.createLinearGradient(0,0,sz,sz);
    grad.addColorStop(0,'#6c35de'); grad.addColorStop(1,'#0099cc');
    ctx.beginPath(); ctx.arc(sz/2,sz/2,sz/2,0,Math.PI*2); ctx.fillStyle=grad; ctx.fill();
    // Building
    var s=sz/100;
    ctx.fillStyle='rgba(255,255,255,.25)';
    ctx.beginPath(); ctx.roundRect(30*s,30*s,40*s,46*s,3*s); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.15)';
    ctx.beginPath(); ctx.roundRect(22*s,38*s,56*s,36*s,3*s); ctx.fill();
    // Windows
    ctx.fillStyle='rgba(255,255,255,.9)';
    [[36,40],[56,40]].forEach(function(p){ctx.beginPath();ctx.roundRect(p[0]*s,p[1]*s,8*s,8*s,2*s);ctx.fill();});
    ctx.fillStyle='rgba(255,255,255,.7)';
    [[36,55],[56,55]].forEach(function(p){ctx.beginPath();ctx.roundRect(p[0]*s,p[1]*s,8*s,8*s,2*s);ctx.fill();});
    // Door
    ctx.fillStyle='rgba(255,255,255,.95)';
    ctx.beginPath(); ctx.roundRect(44*s,62*s,12*s,14*s,2*s); ctx.fill();
    // Star
    ctx.fillStyle='rgba(255,220,80,.95)';
    ctx.beginPath();
    var pts=[[50,14],[52,20],[58,20],[53,24],[55,30],[50,26],[45,30],[47,24],[42,20],[48,20]];
    pts.forEach(function(p,i){if(i===0)ctx.moveTo(p[0]*s,p[1]*s);else ctx.lineTo(p[0]*s,p[1]*s);});
    ctx.closePath(); ctx.fill();
    return canvas.toDataURL('image/png');
  },
  inject: function() {
    // Splash
    var sp = document.getElementById('sp-logo');
    if (sp) sp.innerHTML = LOGO.svg(80);
    // Auth
    var al = document.getElementById('auth-logo');
    if (al) al.innerHTML = LOGO.svg(52);
    // Sidebar
    var sl = document.getElementById('sb-logo-icon');
    if (sl) sl.innerHTML = LOGO.svg(32);
    // Install banner
    var bl = document.getElementById('banner-logo');
    if (bl) bl.innerHTML = LOGO.svg(40);
    // PWA icons
    var icon192 = LOGO.dataUrl(192);
    var icon512 = LOGO.dataUrl(512);
    var ai = document.getElementById('apple-icon');
    if (ai) ai.href = icon192;
    return { icon192: icon192, icon512: icon512 };
  }
};

  insert: async function(t,b){

  ws:null,

// PWA
// ══════════════════════════════════════════
var PWA = {
  prompt: null,
  icons: null,
  init: function(icons) {
    PWA.icons = icons;
    // Build and inject manifest
    var manifest = {
      name: 'EventHub — Hostel Events',
      short_name: 'EventHub',
      description: 'Premium Hostel Event Management Platform',
      start_url: '/',
      display: 'standalone',
      orientation: 'portrait-primary',
      theme_color: '#6c35de',
      background_color: '#1a0533',
      categories: ['entertainment','lifestyle','social'],
      icons: [
        {src: icons.icon192, sizes:'192x192', type:'image/png', purpose:'any maskable'},
        {src: icons.icon512, sizes:'512x512', type:'image/png', purpose:'any maskable'}
      ]
    };
    var blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
    var mlink = document.getElementById('pwa-manifest');
    if (mlink) mlink.href = URL.createObjectURL(blob);
    // Favicon
    var fav = document.getElementById('favicon-svg');
    var svgBlob = new Blob([LOGO.svg(32)], {type:'image/svg+xml'});
    if (fav) fav.href = URL.createObjectURL(svgBlob);
    // Service Worker
    PWA.registerSW(icons);
    // Install prompt listener
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      PWA.prompt = e;
      setTimeout(function(){
        var banner = document.getElementById('install-banner');
        if (banner && !localStorage.getItem('eh_installed') && !localStorage.getItem('eh_dismissed'))
          banner.classList.add('show');
      }, 3000);
    });
    window.addEventListener('appinstalled', function() {
      localStorage.setItem('eh_installed','1');
      var banner = document.getElementById('install-banner');
      if (banner) banner.classList.remove('show');
      App.toast('EventHub installed! 🎉 Check your home screen','ok');
    });
  },
  install: function() {
    if (!PWA.prompt) {
      // iOS fallback instructions
      App.showModal(
        '<div style="text-align:center">'
        + LOGO.svg(56)
        + '<div style="font-weight:800;font-size:17px;margin:12px 0 6px">Install EventHub</div>'
        + '<div style="font-size:13px;color:var(--mut);margin-bottom:20px">Add to your home screen for instant access</div>'
        + '<div class="ehc p-4 text-start mb-3">'
        + '<div style="display:flex;gap:10px;align-items:center;margin-bottom:12px"><span style="font-size:20px">📱</span><div><div style="font-weight:700;font-size:13px">iPhone / iPad</div><div style="font-size:12px;color:var(--mut)">Tap the Share icon → "Add to Home Screen"</div></div></div>'
        + '<div style="display:flex;gap:10px;align-items:center;margin-bottom:12px"><span style="font-size:20px">🤖</span><div><div style="font-weight:700;font-size:13px">Android</div><div style="font-size:12px;color:var(--mut)">Tap ⋮ menu → "Add to Home Screen" or "Install App"</div></div></div>'
        + '<div style="display:flex;gap:10px;align-items:center"><span style="font-size:20px">💻</span><div><div style="font-weight:700;font-size:13px">Windows / Mac</div><div style="font-size:12px;color:var(--mut)">Click the install icon in the address bar</div></div></div>'
        + '</div>'
        + '<button class="bv w-100" onclick="App.closeModal()">Got it!</button></div>'
      );
      return;
    }
    PWA.prompt.prompt();
    PWA.prompt.userChoice.then(function(r) {
      if (r.outcome === 'accepted') localStorage.setItem('eh_installed','1');
      PWA.prompt = null;
      var banner = document.getElementById('install-banner');
      if (banner) banner.classList.remove('show');
    });
  },
  dismiss: function() {
    localStorage.setItem('eh_dismissed','1');
    var banner = document.getElementById('install-banner');
    if (banner) banner.classList.remove('show');
  },
  registerSW: function(icons) {
    if (!('serviceWorker' in navigator)) return;
    var swCode = [
      "var CACHE='eventhub-v2';",
      "var SHELL=['/'];",
      "self.addEventListener('install',function(e){",
      "  e.waitUntil(caches.open(CACHE).then(function(c){return c.addAll(SHELL).catch(function(){});}));",
      "  self.skipWaiting();",
      "});",
      "self.addEventListener('activate',function(e){",
      "  e.waitUntil(caches.keys().then(function(keys){",
      "    return Promise.all(keys.filter(function(k){return k!==CACHE;}).map(function(k){return caches.delete(k);}));",
      "  }).then(function(){return clients.claim();}));",
      "});",
      "self.addEventListener('fetch',function(e){",
      "  if(e.request.method!=='GET')return;",
      "  e.respondWith(fetch(e.request).then(function(r){",
      "    var rc=r.clone();",
      "    caches.open(CACHE).then(function(c){c.put(e.request,rc);});",
      "    return r;",
      "  }).catch(function(){return caches.match(e.request);}));",
      "});"
    ].join('\n');
    var blob = new Blob([swCode], {type:'application/javascript'});
    var url = URL.createObjectURL(blob);
    navigator.serviceWorker.register(url)
      .then(function(reg){
        console.log('[EventHub] Service Worker registered. App is installable on home screen.');
        reg.addEventListener('updatefound', function(){console.log('[EventHub] SW update found');});
      })
      .catch(function(e){console.warn('[EventHub] SW registration failed:',e.message);});
  }
};

var U={
  esc:function(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');},
  ini:function(n){return String(n||'?').split(' ').map(function(x){return x[0]||'';}).join('').slice(0,2).toUpperCase();},
  av:function(url,ini,sz,st){
    sz=sz||34;st=st||'';
    if(url)return '<div class="av" style="width:'+sz+'px;height:'+sz+'px;'+st+'"><img src="'+U.esc(url)+'" alt=""></div>';
    return '<div class="av av-grad" style="width:'+sz+'px;height:'+sz+'px;font-size:'+Math.floor(sz/2.6)+'px;'+st+'">'+U.esc(ini)+'</div>';
  },
  fmtT:function(ts){var d=new Date(ts),h=d.getHours(),m=d.getMinutes(),ap=h>=12?'pm':'am';h=h%12||12;return h+':'+String(m).padStart(2,'0')+' '+ap;},
  fmtD:function(iso){if(!iso)return'';var d=new Date(iso+'T00:00:00'),days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],mons=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return days[d.getDay()]+' '+d.getDate()+' '+mons[d.getMonth()];},
  gv:function(id){var el=document.getElementById(id);return el?el.value:'';},
  evImg:function(e){return(e.images&&e.images.length)?e.images[e.imageIdx||0]:(IMGS[e.type]||IMGS['Social']);},
  userById:function(id){return Object.values(STORE.users).find(function(u){return u.id===id;})||null;},
  convsFor:function(uid){return STORE.conversations.filter(function(c){return c.participants.indexOf(uid)>-1;});},
  msgsFor:function(cid){return STORE.messages.filter(function(m){return m.convId===cid;}).sort(function(a,b){return a.ts-b.ts;});},
  other:function(conv,uid){return conv.participants.find(function(p){return p!==uid;})||null;},
  isReg:function(uid,eid){return(STORE.registrations[uid]||[]).indexOf(eid)>-1;},
  readFile:function(file,cb){var r=new FileReader();r.onload=function(ev){cb(ev.target.result);};r.readAsDataURL(file);}
};

      if(!STORE.messages.find(function(m){return m.id===rec.id;})){
        STORE.messages.push({id:rec.id,convId:rec.conversation_id,senderId:rec.sender_id,text:rec.content||'',imgUrl:rec.image_url||null,ts:new Date(rec.created_at).getTime()});

      if(p&&p.votes[rec.voter_id]===undefined){p.votes[rec.voter_id]=rec.option_index;if(p.opts[rec.option_index])p.opts[rec.option_index].v++;if(SS.page==='polls')App.render();}

    if(table==='registrations'&&event==='INSERT'){
      var ev=STORE.events.find(function(e){return e.id===rec.event_id;});
      if(ev){ev.reg=Math.min(ev.reg+1,ev.cap);if(SS.page==='dashboard'||SS.page==='analytics')App.render();}
    }
    if(table==='guest_requests'&&event==='INSERT'&&SS.user.role==='admin'){
      if(!STORE.guests.find(function(g){return g.id===rec.id;})){

function makeQR(seed,sz,cell){
  sz=sz||7;cell=cell||11;
  var s=0;for(var i=0;i<seed.length;i++)s+=seed.charCodeAt(i);
  var h='';
  for(var r=0;r<sz;r++)for(var c=0;c<sz;c++){
    var corner=(r<2&&c<2)||(r<2&&c>=sz-2)||(r>=sz-2&&c<2);
    var on=corner||((s*(r+1)*(c+1)*7)%3===0);
    h+='<div style="width:'+cell+'px;height:'+cell+'px;background:'+(on?'#111':'#fff')+';border-radius:'+(corner?2:1)+'px"></div>';
  }
  return '<div class="qrw" style="grid-template-columns:repeat('+sz+','+cell+'px)">'+h+'</div>';
}

  swiperAdd:function(eid,input){

      var e=STORE.events.find(function(x){return x.id===eid;});if(!e)return;
      e.images.push(r);e.imageIdx=e.images.length-1;
      var el=document.getElementById('swiper-img');if(el)el.src=r;

  swiperRemove:function(eid){

  },
  oMedia:function(){
    var allCats=['All'].concat(STORE.media.map(function(m){return m.cat;}).filter(function(v,i,a){return a.indexOf(v)===i;}));
    var filtered=SS.mediaFilter==='All'?STORE.media:STORE.media.filter(function(m){return m.cat===SS.mediaFilter;});
    var h='<div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:12px"><div><div style="font-size:22px;font-weight:800">Media Library</div><div style="font-size:13px;color:var(--mut);margin-top:4px">'+STORE.media.length+' images · Upload, describe and use for events</div></div><button class="bv" onclick="Pages.showAddMedia()"><i class="bi bi-plus"></i> Add Image</button></div>'
      +'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px">';
    allCats.forEach(function(cat){var active=SS.mediaFilter===cat;h+='<button class="bg bsm" onclick="SS.mediaFilter=\''+cat+'\';App.render()" style="'+(active?'background:var(--vbg);border-color:var(--v);color:var(--v)':'')+'">'+U.esc(cat)+'</button>';});
    h+='</div><div class="row g-3">';
    filtered.forEach(function(m){
      h+='<div class="col-12 col-sm-6 col-md-4"><div class="ehc p-0 overflow-hidden"><div style="height:140px;overflow:hidden;position:relative"><img src="'+U.esc(m.url)+'" style="width:100%;height:100%;object-fit:cover" loading="lazy"><div style="position:absolute;top:8px;right:8px"><span class="bdv" style="font-size:10px">'+U.esc(m.cat)+'</span></div></div>'
        +'<div style="padding:13px"><div style="font-weight:700;font-size:14px;margin-bottom:4px">'+U.esc(m.label)+'</div><div style="font-size:12px;color:var(--mut);margin-bottom:10px">'+U.esc(m.desc)+'</div>'
        +'<div style="display:flex;gap:8px"><button class="bv bxs" style="flex:1" onclick="Pages.useMedia(\''+m.id+'\')"><i class="bi bi-calendar-plus"></i> Use for Event</button><button class="bg bxs" onclick="Pages.delMedia(\''+m.id+'\')"><i class="bi bi-trash"></i></button></div>'
        +'</div></div></div>';
    });
    return h+'</div></div>';
  },
  showAddMedia:function(){
    SS.pendingMedia=null;
    App.showModal('<div style="font-weight:800;font-size:16px;margin-bottom:16px">Add New Image to Library</div>'
      +'<input type="file" id="media-in" accept="image/*" style="display:none" onchange="Pages.previewMedia(this)">'
      +'<div id="media-preview" style="height:140px;border-radius:12px;overflow:hidden;background:var(--card2);display:flex;align-items:center;justify-content:center;margin-bottom:14px;cursor:pointer;border:2px dashed var(--bord2)" onclick="document.getElementById(\'media-in\').click()"><div style="text-align:center;color:var(--mut)"><div style="font-size:32px;margin-bottom:8px">📸</div><div style="font-size:13px">Click to select image</div></div></div>'
      +'<div style="font-size:11px;color:var(--mut);margin-bottom:5px;letter-spacing:.5px">IMAGE LABEL *</div><input class="inp mb-3" id="ml-label" placeholder="e.g. Movie Night Banner">'
      +'<div style="font-size:11px;color:var(--mut);margin-bottom:5px;letter-spacing:.5px">DESCRIPTION</div><input class="inp mb-3" id="ml-desc" placeholder="e.g. Cinema vibes">'
      +'<div style="font-size:11px;color:var(--mut);margin-bottom:5px;letter-spacing:.5px">CATEGORY</div>'
      +'<select class="inp mb-4" id="ml-cat">'+['Movie Night','House Party','Gaming Night','Birthday','Sports','Study Social','Social','Music Night','Other'].map(function(c){return '<option>'+c+'</option>';}).join('')+'</select>'
      +'<div style="display:flex;gap:10px"><button class="bg" style="flex:1" onclick="App.closeModal()">Cancel</button><button class="bv" style="flex:1" onclick="Pages.saveMedia()">Save to Library</button></div>');
  },
  previewMedia:function(input){
    var file=input.files[0];if(!file)return;if(file.size>8*1024*1024){App.toast('Max 8MB','err');return;}
    SS.pendingMedia=file;
    U.readFile(file,function(r){var p=document.getElementById('media-preview');if(p)p.innerHTML='<img src="'+r+'" style="width:100%;height:100%;object-fit:cover">';});
  },
  saveMedia:function(){
    var label=U.gv('ml-label').trim(),desc=U.gv('ml-desc').trim(),cat=U.gv('ml-cat');
    if(!label){App.toast('Label is required','err');return;}
    if(!SS.pendingMedia){App.toast('Please select an image','err');return;}
    U.readFile(SS.pendingMedia,function(r){
      var newMedia={id:'md'+Date.now(),url:r,label:label,desc:desc||'New image',cat:cat};
      STORE.media.push(newMedia);SS.pendingMedia=null;
      // Feature 12 — notify admins instantly
      Notif.pushRole('admin','New Media Added 🖼','"'+label+'" added — use it for new events','media');
      App.closeModal();App.render();App.toast('"'+label+'" added to library ✅','ok');
    });
  },
  delMedia:function(id){
    if(!confirm('Delete this image?'))return;
    STORE.media=STORE.media.filter(function(m){return m.id!==id;});App.render();App.toast('Image deleted','err');
  },
  useMedia:function(mid){
    SS.createForm.bannerId=mid;App.go('create');App.toast('Image set as event banner!','ok');
  }
};

// ── SCANNER ──
var Scanner={
  stream:null,timer:null,on:false,
  toggle:function(){if(Scanner.on)Scanner.stop();else Scanner.start();},
  start:function(){
    navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(function(stream){
      Scanner.stream=stream;var v=document.getElementById('qr-video'),ph=document.getElementById('scan-ph'),btn=document.getElementById('scan-btn');
      if(v){v.srcObject=stream;v.style.display='block';v.play();}
      if(ph)ph.style.display='none';if(btn)btn.innerHTML='<i class="bi bi-stop-circle"></i> Stop';
      Scanner.on=true;
    }).catch(function(){App.toast('Camera denied — use Simulate','err');});
  },
  stop:function(){
    if(Scanner.stream)Scanner.stream.getTracks().forEach(function(t){t.stop();});
    if(Scanner.timer)clearInterval(Scanner.timer);
    Scanner.stream=null;Scanner.on=false;
    var v=document.getElementById('qr-video'),ph=document.getElementById('scan-ph'),btn=document.getElementById('scan-btn');
    if(v)v.style.display='none';if(ph)ph.style.display='block';if(btn)btn.innerHTML='<i class="bi bi-camera"></i> Start Camera';
  },
  process:function(data){
    Scanner.stop();
    var sel=document.getElementById('scanev');var evId=sel?parseInt(sel.value):(STORE.events[0]?STORE.events[0].id:0);
    var ev=STORE.events.find(function(e){return e.id===evId;});
    var ok=data.indexOf('EMS')===0;
    SS.scanRes={ok:ok,name:ok?'Verified Attendee':'Unknown',ev:ev?ev.title:'Unknown',code:data};
    App.render();App.toast(ok?'✅ Entry granted!':'❌ Invalid ticket!',ok?'ok':'err');
  },
  sim:function(){
    var sel=document.getElementById('scanev');var evId=sel?parseInt(sel.value):(STORE.events[0]?STORE.events[0].id:0);
    Scanner.process(Math.random()>0.25?'EMS'+String(evId).padStart(3,'0')+'-SIM':'INVALID-TOKEN');
  }
};

// ── CLICK OUTSIDE ──
document.addEventListener('click',function(e){
  var sb=document.getElementById('sidebar');
  if(sb&&sb.classList.contains('open')&&!sb.contains(e.target)&&!e.target.closest('#menu-btn'))sb.classList.remove('open');
  var np=document.getElementById('notif-panel');
  if(np&&np.classList.contains('on')&&!np.contains(e.target)&&!e.target.closest('#notif-btn'))np.classList.remove('on');
});

// ── BOOT ──
window.addEventListener('DOMContentLoaded',function(){
  var icons=LOGO.inject();
  PWA.init(icons);
  App.showScreen('splash');
});
</script>
